<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>デジタルツール管理ダッシュボード (Cloud)</title>
    <meta name="description" content="児童の学習で使用するデジタルツールをFirebaseで管理できるダッシュボード">
    <style>
        :root {
            --bg-primary: #f0f4f8;
            --bg-secondary: #ffffff;
            --text-primary: #1a202c;
            --text-secondary: #4a5568;
            --border-color: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --radius: 12px;
            --radius-sm: 8px;

            /* 教科別カラー */
            --color-kokugo: #ef4444;
            --color-sansu: #3b82f6;
            --color-rika: #22c55e;
            --color-shakai: #f97316;
            --color-eigo: #a855f7;
            --color-ongaku: #ec4899;
            --color-zuko: #eab308;
            --color-taiiku: #06b6d4;
            --color-sonota: #6b7280;

            /* 新しい教科 */
            --color-dotoku: #14b8a6;
            --color-kateika: #f43f5e;
            --color-sogo: #6366f1;
            --color-gakkatsu: #84cc16;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Meiryo', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* ヘッダー */
        .header {
            background: linear-gradient(135deg, #2d3748 0%, #1a202c 100%);
            color: white;
            padding: 1.5rem 2rem;
            box-shadow: var(--shadow-lg);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .header h1::before {
            content: '☁️';
            font-size: 1.5rem;
        }

        .add-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
            padding: 0.75rem 1.5rem;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transform: translateY(-2px);
        }

        .auth-container {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .login-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 0.5rem 1rem;
            border-radius: 50px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .login-btn:hover {
            background: white;
            color: #1a202c;
        }

        .user-info {
            font-size: 0.9rem;
            margin-right: 0.5rem;
        }

        .add-btn:hover {
            background: white;
            color: #1a202c;
            transform: translateY(-2px);
        }

        /* メインコンテナ */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* 教科タブ */
        .subject-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 2rem;
            background: var(--bg-secondary);
            padding: 1rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        .tab-btn {
            padding: 0.625rem 1.25rem;
            border: none;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: var(--bg-primary);
            color: var(--text-secondary);
        }

        .tab-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .tab-btn.active {
            color: white;
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .tab-btn[data-subject="all"].active {
            background: #2d3748;
        }

        .tab-btn[data-subject="国語"].active {
            background: var(--color-kokugo);
        }

        .tab-btn[data-subject="算数"].active {
            background: var(--color-sansu);
        }

        .tab-btn[data-subject="理科"].active {
            background: var(--color-rika);
        }

        .tab-btn[data-subject="社会"].active {
            background: var(--color-shakai);
        }

        .tab-btn[data-subject="英語"].active {
            background: var(--color-eigo);
        }

        .tab-btn[data-subject="音楽"].active {
            background: var(--color-ongaku);
        }

        .tab-btn[data-subject="図工"].active {
            background: var(--color-zuko);
        }

        .tab-btn[data-subject="体育"].active {
            background: var(--color-taiiku);
        }

        .tab-btn[data-subject="その他"].active {
            background: var(--color-sonota);
        }

        .tab-btn[data-subject="道徳"].active {
            background: var(--color-dotoku);
        }

        .tab-btn[data-subject="家庭科"].active {
            background: var(--color-kateika);
        }

        .tab-btn[data-subject="総合"].active {
            background: var(--color-sogo);
        }

        .tab-btn[data-subject="学活"].active {
            background: var(--color-gakkatsu);
        }

        /* ツールグリッド */
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        /* ツールカード */
        .tool-card {
            background: var(--bg-secondary);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            position: relative;
        }

        .tool-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .card-header {
            height: 8px;
            width: 100%;
        }

        .card-header.国語 {
            background: var(--color-kokugo);
        }

        .card-header.算数 {
            background: var(--color-sansu);
        }

        .card-header.理科 {
            background: var(--color-rika);
        }

        .card-header.社会 {
            background: var(--color-shakai);
        }

        .card-header.英語 {
            background: var(--color-eigo);
        }

        .card-header.音楽 {
            background: var(--color-ongaku);
        }

        .card-header.図工 {
            background: var(--color-zuko);
        }

        .card-header.体育 {
            background: var(--color-taiiku);
        }

        .card-header.その他 {
            background: var(--color-sonota);
        }

        .card-header.道徳 {
            background: var(--color-dotoku);
        }

        .card-header.家庭科 {
            background: var(--color-kateika);
        }

        .card-header.総合 {
            background: var(--color-sogo);
        }

        .card-header.学活 {
            background: var(--color-gakkatsu);
        }

        .card-content {
            padding: 1.25rem;
        }

        .card-subject {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
            color: white;
            margin-bottom: 0.75rem;
        }

        .card-subject.国語 {
            background: var(--color-kokugo);
        }

        .card-subject.算数 {
            background: var(--color-sansu);
        }

        .card-subject.理科 {
            background: var(--color-rika);
        }

        .card-subject.社会 {
            background: var(--color-shakai);
        }

        .card-subject.英語 {
            background: var(--color-eigo);
        }

        .card-subject.音楽 {
            background: var(--color-ongaku);
        }

        .card-subject.図工 {
            background: var(--color-zuko);
        }

        .card-subject.体育 {
            background: var(--color-taiiku);
        }

        .card-subject.その他 {
            background: var(--color-sonota);
        }

        .card-subject.道徳 {
            background: var(--color-dotoku);
        }

        .card-subject.家庭科 {
            background: var(--color-kateika);
        }

        .card-subject.総合 {
            background: var(--color-sogo);
        }

        .card-subject.学活 {
            background: var(--color-gakkatsu);
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .card-url {
            font-size: 0.8rem;
            color: var(--text-secondary);
            word-break: break-all;
            margin-bottom: 1rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2; /* CSSLint警告対応 */
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-actions {
            display: flex;
            gap: 0.5rem;
        }

        .card-btn {
            flex: 1;
            padding: 0.625rem;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .open-btn {
            background: #2d3748;
            color: white;
        }

        .open-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .edit-btn {
            background: var(--bg-primary);
            color: var(--text-secondary);
        }

        .edit-btn:hover {
            background: #e2e8f0;
        }

        .delete-btn {
            background: #fee2e2;
            color: #dc2626;
            flex: 0.5;
        }

        .delete-btn:hover {
            background: #fecaca;
        }

        /* モーダル */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--bg-secondary);
            border-radius: var(--radius);
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
            animation: modalSlideIn 0.3s ease;
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            font-size: 1.25rem;
            font-weight: 700;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-secondary);
            transition: color 0.3s ease;
        }

        .close-btn:hover {
            color: var(--text-primary);
        }

        .modal-body {
            padding: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid var(--border-color);
            border-radius: var(--radius-sm);
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #2d3748;
        }

        .submit-btn {
            width: 100%;
            padding: 1rem;
            background: #2d3748;
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow);
            background: #1a202c;
        }

        /* 読み込み中表示 */
        #loadingOverlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.7);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 1rem;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--border-color);
            border-top: 4px solid #2d3748;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* 空状態 */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .empty-state h3 {
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        /* レスポンシブ */
        @media (max-width: 768px) {
            .header {
                padding: 1rem;
            }

            .header-content {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }

            .header h1 {
                font-size: 1.25rem;
                width: 100%;
            }

            .auth-container {
                width: 100%;
                justify-content: space-between;
                flex-wrap: wrap;
                gap: 0.5rem;
            }

            .user-info {
                width: 100%;
                font-size: 0.8rem;
                margin-bottom: 0.5rem;
                order: -1;
                /* Show email above buttons */
            }

            .add-btn,
            .login-btn {
                padding: 0.5rem 0.8rem;
                font-size: 0.8rem;
                flex: 1;
                /* Distribute space evenly */
                text-align: center;
                justify-content: center;
            }

            .container {
                padding: 1rem;
            }

            .subject-tabs {
                padding: 0.75rem;
                justify-content: center;
                /* Center tabs on mobile */
            }

            .tab-btn {
                padding: 0.4rem 0.8rem;
                font-size: 0.8rem;
            }

            .tools-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
        }

        .delete-btn-confirm:hover {
            background: #b91c1c !important;
        }

        .cancel-btn:hover {
            background: #a0aec0 !important;
        }

        /* フィルター・バッジ設定 */
        .filter-container {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
            align-items: center;
            background: var(--bg-secondary);
            padding: 1rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            flex-wrap: wrap;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 600;
        }

        .filter-group select {
            padding: 0.5rem;
            border: 2px solid var(--border-color);
            border-radius: var(--radius-sm);
            background: var(--bg-primary);
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-primary);
            outline: none;
            transition: border-color 0.3s ease;
        }

        .filter-group select:focus {
            border-color: #2d3748;
        }

        .tool-meta {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            display: flex;
            gap: 0.5rem;
        }

        .meta-badge {
            background: #edf2f7;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div id="loadingOverlay">
        <div class="spinner"></div>
        <p>読み込み中...</p>
    </div>

    <header class="header">
        <div class="header-content">
            <h1>デジ活ツール（クラウド版）</h1>
            <div class="auth-container">
                <a href="view.html" class="login-btn"
                    style="text-decoration: none; background: #4299e1; border: none;">👧 児童用ページ</a>
                <div id="userInfo" class="user-info" style="display: none;"></div>
                <button class="login-btn" id="loginBtn">管理者ログイン</button>
                <button class="login-btn" id="logoutBtn" style="display: none;">ログアウト</button>
                <button class="add-btn" id="manageYearsBtn" style="display: none; background: #4a5568; margin-right: 0.5rem;">
                    <span>📅</span> 年度を管理
                </button>
                <button class="add-btn" id="openModalBtn" style="display: none;">
                    <span>＋</span> ツールを追加
                </button>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="filter-container">
            <div class="filter-group">
                <label for="filterYear">年度:</label>
                <select id="filterYear">
                    <option value="all">すべての年度</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="filterGrade">学年:</label>
                <select id="filterGrade">
                    <option value="all">すべての学年</option>
                    <option value="1年生">1年生</option>
                    <option value="2年生">2年生</option>
                    <option value="3年生">3年生</option>
                    <option value="4年生">4年生</option>
                    <option value="5年生">5年生</option>
                    <option value="6年生">6年生</option>
                </select>
            </div>
        </div>

        <nav class="subject-tabs" id="subjectTabs">
            <button class="tab-btn active" data-subject="all">📚 すべて</button>
            <button class="tab-btn" data-subject="国語">📖 国語</button>
            <button class="tab-btn" data-subject="算数">🔢 算数</button>
            <button class="tab-btn" data-subject="理科">🔬 理科</button>
            <button class="tab-btn" data-subject="社会">🌍 社会</button>
            <button class="tab-btn" data-subject="英語">🔤 英語</button>
            <button class="tab-btn" data-subject="音楽">🎵 音楽</button>
            <button class="tab-btn" data-subject="図工">🎨 図工</button>
            <button class="tab-btn" data-subject="体育">⚽ 体育</button>
            <button class="tab-btn" data-subject="道徳">🧡 道徳</button>
            <button class="tab-btn" data-subject="家庭科">🍳 家庭科</button>
            <button class="tab-btn" data-subject="総合">🔍 総合</button>
            <button class="tab-btn" data-subject="学活">🏫 学活</button>
            <button class="tab-btn" data-subject="その他">📁 その他</button>
        </nav>

        <div class="tools-grid" id="toolsGrid">
            <!-- ツールカードがここに表示される -->
        </div>

        <div class="empty-state" id="emptyState" style="display: none;">
            <div class="empty-state-icon">📭</div>
            <h3>ツールがまだ登録されていません</h3>
            <p>「＋ ツールを追加」ボタンからツールを登録してください</p>
        </div>
    </main>

    <!-- 追加/編集モーダル -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalTitle">ツールを追加</h2>
                <button class="close-btn" id="closeModalBtn">&times;</button>
            </div>
            <div class="modal-body">
                <form id="toolForm">
                    <input type="hidden" id="toolId">
                    <div class="form-group">
                        <label for="toolName">ツール名 *</label>
                        <input type="text" id="toolName" placeholder="例: NHK for School" required>
                    </div>
                    <div class="form-group">
                        <label for="toolUrl">URL *</label>
                        <input type="url" id="toolUrl" placeholder="例: https://www.nhk.or.jp/school/" required>
                    </div>
                    <div class="form-group" style="display: flex; gap: 1rem;">
                        <div style="flex: 1;">
                            <label for="toolYear">年度</label>
                            <select id="toolYear">
                                <option value="全年度">全年度</option>
                            </select>
                        </div>
                        <div style="flex: 1;">
                            <label for="toolGrade">学年</label>
                            <select id="toolGrade">
                                <option value="全学年">全学年</option>
                                <option value="1年生">1年生</option>
                                <option value="2年生">2年生</option>
                                <option value="3年生">3年生</option>
                                <option value="4年生">4年生</option>
                                <option value="5年生">5年生</option>
                                <option value="6年生">6年生</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="toolSubject">教科 *</label>
                        <select id="toolSubject" required>
                            <option value="">選択してください</option>
                            <option value="国語">国語</option>
                            <option value="算数">算数</option>
                            <option value="理科">理科</option>
                            <option value="社会">社会</option>
                            <option value="英語">英語</option>
                            <option value="音楽">音楽</option>
                            <option value="図工">図工</option>
                            <option value="体育">体育</option>
                            <option value="道徳">道徳</option>
                            <option value="家庭科">家庭科</option>
                            <option value="総合">総合</option>
                            <option value="学活">学活</option>
                            <option value="その他">その他</option>
                        </select>
                    </div>
                    <button type="submit" class="submit-btn" id="submitBtn">追加する</button>
                </form>
            </div>
        </div>
    </div>

    <!-- 削除確認モーダル -->
    <div class="modal-overlay" id="deleteModalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h2>削除の確認</h2>
                <button class="close-btn" id="closeDeleteModalBtn">&times;</button>
            </div>
            <div class="modal-body">
                <p>本当にこのツールを削除しますか？</p>
                <p id="deleteToolName" style="font-weight: bold; margin: 1rem 0;"></p>
                <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
                    <button class="submit-btn delete-btn-confirm" id="confirmDeleteBtn"
                        style="background: #dc2626;">削除する</button>
                    <button class="submit-btn cancel-btn" id="cancelDeleteBtn"
                        style="background: #cbd5e0; color: #4a5568;">キャンセル</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 年度管理モーダル -->
    <div class="modal-overlay" id="yearModalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h2>年度を管理</h2>
                <button class="close-btn" id="closeYearModalBtn">&times;</button>
            </div>
            <div class="modal-body">
                <div style="margin-bottom: 1rem;">
                    <ul id="yearList" style="list-style: none; padding: 0; max-height: 300px; overflow-y: auto;"></ul>
                </div>
                <div class="form-group" style="display: flex; gap: 0.5rem; margin-bottom: 0;">
                    <input type="text" id="newYearInput" placeholder="例: 2027年度" style="flex: 1;">
                    <button class="submit-btn" id="addYearBtn" style="width: auto; padding: 0.5rem 1.5rem;">追加</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.2/firebase-app.js";
        import {
            getFirestore,
            collection,
            addDoc,
            getDocs,
            updateDoc,
            deleteDoc,
            doc,
            getDoc,
            setDoc,
            query,
            orderBy,
            serverTimestamp
        } from "https://www.gstatic.com/firebasejs/10.7.2/firebase-firestore.js";
        import {
            getAuth,
            signInWithPopup,
            GoogleAuthProvider,
            onAuthStateChanged,
            signOut
        } from "https://www.gstatic.com/firebasejs/10.7.2/firebase-auth.js";

        // 定数
        const ADMIN_EMAIL = 'd.a0807derude@gmail.com';

        // Firebase設定
        const firebaseConfig = {
            apiKey: "AIzaSyBx2B8AemAyoXFNR6kmWk1OCsnUNHFc4kI",
            authDomain: "gen-lang-client-0309545089.firebaseapp.com",
            projectId: "gen-lang-client-0309545089",
            storageBucket: "gen-lang-client-0309545089.firebasestorage.app",
            messagingSenderId: "400466016438",
            appId: "1:400466016438:web:eed4fc62974097e26cce17",
            measurementId: "G-XL68PEV1QD"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        const toolsCol = collection(db, 'tools');

        // 年度管理クラス
        class YearManager {
            constructor() {
                this.years = ['2026年度'];
            }
            async loadYears() {
                try {
                    const docRef = doc(db, 'config', 'general');
                    const docSnap = await getDoc(docRef);
                    if (docSnap.exists() && docSnap.data().years) {
                        this.years = docSnap.data().years;
                    } else {
                        await setDoc(docRef, { years: this.years }, { merge: true });
                    }
                    return this.years;
                } catch (error) {
                    console.error("Error loading years:", error);
                    return this.years;
                }
            }
            async addYear(newYear) {
                if (!this.years.includes(newYear)) {
                    this.years.push(newYear);
                    this.years.sort().reverse(); //降順ソート
                    await this.saveYears();
                }
            }
            async deleteYear(target) {
                this.years = this.years.filter(y => y !== target);
                await this.saveYears();
            }
            async saveYears() {
                try {
                    const docRef = doc(db, 'config', 'general');
                    await setDoc(docRef, { years: this.years }, { merge: true });
                } catch(e) { console.error('Error saving years', e); }
            }
        }

        // データ管理クラス
        class ToolManager {
            constructor() {
                this.tools = [];
            }

            async loadTools() {
                try {
                    const q = query(toolsCol, orderBy('createdAt', 'desc'));
                    const querySnapshot = await getDocs(q);
                    this.tools = querySnapshot.docs.map(doc => ({
                        id: doc.id,
                        ...doc.data()
                    }));
                    return this.tools;
                } catch (error) {
                    console.error("Error loading tools:", error);
                    alert("データの読み込みに失敗しました。Firestoreのセキュリティルールを確認してください。");
                    return [];
                }
            }

            async addTool(tool) {
                const docRef = await addDoc(toolsCol, {
                    ...tool,
                    createdAt: serverTimestamp()
                });
                return { id: docRef.id, ...tool };
            }

            async updateTool(id, toolData) {
                const toolRef = doc(db, 'tools', id);
                await updateDoc(toolRef, toolData);
                return { id, ...toolData };
            }

            async deleteTool(id) {
                const toolRef = doc(db, 'tools', id);
                await deleteDoc(toolRef);
            }

            getTools(subject = 'all', year = 'all', grade = 'all') {
                let filtered = this.tools;
                if (subject !== 'all') {
                    filtered = filtered.filter(t => t.subject === subject);
                }
                if (year !== 'all') {
                    filtered = filtered.filter(t => !t.year || t.year === '全年度' || t.year === year);
                }
                if (grade !== 'all') {
                    filtered = filtered.filter(t => !t.grade || t.grade === '全学年' || t.grade === grade);
                }
                return filtered;
            }

            getToolById(id) {
                return this.tools.find(t => t.id === id);
            }
        }

        // UIコントローラー
        class UIController {
            constructor(toolManager, yearManager) {
                this.toolManager = toolManager;
                this.yearManager = yearManager;
                this.currentSubject = 'all';
                this.currentYear = 'all';
                this.currentGrade = 'all';
                this.editingId = null;
                this.pendingDeleteId = null;
                this.isAdmin = false;

                this.initElements();
                this.initEventListeners();
                this.initializeApp();
            }

            initElements() {
                this.toolsGrid = document.getElementById('toolsGrid');
                this.emptyState = document.getElementById('emptyState');
                this.modalOverlay = document.getElementById('modalOverlay');
                this.modalTitle = document.getElementById('modalTitle');
                this.toolForm = document.getElementById('toolForm');
                this.toolIdInput = document.getElementById('toolId');
                this.toolNameInput = document.getElementById('toolName');
                this.toolUrlInput = document.getElementById('toolUrl');
                this.toolYearInput = document.getElementById('toolYear');
                this.toolGradeInput = document.getElementById('toolGrade');
                this.toolSubjectInput = document.getElementById('toolSubject');
                this.submitBtn = document.getElementById('submitBtn');
                this.subjectTabs = document.getElementById('subjectTabs');
                this.filterYear = document.getElementById('filterYear');
                this.filterGrade = document.getElementById('filterGrade');
                this.loadingOverlay = document.getElementById('loadingOverlay');

                // 認証要素
                this.loginBtn = document.getElementById('loginBtn');
                this.logoutBtn = document.getElementById('logoutBtn');
                this.userInfo = document.getElementById('userInfo');
                this.openModalBtn = document.getElementById('openModalBtn');
                this.manageYearsBtn = document.getElementById('manageYearsBtn');

                // 年度モーダル要素
                this.yearModalOverlay = document.getElementById('yearModalOverlay');
                this.closeYearModalBtn = document.getElementById('closeYearModalBtn');
                this.yearList = document.getElementById('yearList');
                this.newYearInput = document.getElementById('newYearInput');
                this.addYearBtn = document.getElementById('addYearBtn');

                // 削除モーダル要素
                this.deleteModalOverlay = document.getElementById('deleteModalOverlay');
                this.deleteToolName = document.getElementById('deleteToolName');
                this.confirmDeleteBtn = document.getElementById('confirmDeleteBtn');
                this.cancelDeleteBtn = document.getElementById('cancelDeleteBtn');
            }

            initEventListeners() {
                // 認証
                this.loginBtn.addEventListener('click', () => this.handleLogin());
                this.logoutBtn.addEventListener('click', () => this.handleLogout());

                // モーダル開閉
                this.openModalBtn.addEventListener('click', () => this.openModal());
                document.getElementById('closeModalBtn').addEventListener('click', () => this.closeModal());
                this.modalOverlay.addEventListener('click', (e) => {
                    if (e.target === this.modalOverlay) this.closeModal();
                });

                // 年度管理
                this.manageYearsBtn.addEventListener('click', () => this.openYearModal());
                this.closeYearModalBtn.addEventListener('click', () => this.closeYearModal());
                this.yearModalOverlay.addEventListener('click', (e) => {
                    if (e.target === this.yearModalOverlay) this.closeYearModal();
                });
                this.addYearBtn.addEventListener('click', () => this.handleAddYear());

                // フォーム送信
                this.toolForm.addEventListener('submit', (e) => this.handleSubmit(e));

                // 教科タブ
                this.subjectTabs.addEventListener('click', (e) => {
                    if (e.target.classList.contains('tab-btn')) {
                        this.selectSubject(e.target.dataset.subject);
                    }
                });

                // フィルター（年度・学年）
                this.filterYear.addEventListener('change', (e) => {
                    this.currentYear = e.target.value;
                    this.renderTools();
                });
                this.filterGrade.addEventListener('change', (e) => {
                    this.currentGrade = e.target.value;
                    this.renderTools();
                });

                // キーボードショートカット
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') {
                        this.closeModal();
                        this.closeDeleteModal();
                    }
                });

                // 削除モーダル
                document.getElementById('closeDeleteModalBtn').addEventListener('click', () => this.closeDeleteModal());
                this.cancelDeleteBtn.addEventListener('click', () => this.closeDeleteModal());
                this.confirmDeleteBtn.addEventListener('click', () => this.executeDelete());
                this.deleteModalOverlay.addEventListener('click', (e) => {
                    if (e.target === this.deleteModalOverlay) this.closeDeleteModal();
                });
            }

            showLoading() { this.loadingOverlay.style.display = 'flex'; }
            hideLoading() { this.loadingOverlay.style.display = 'none'; }

            async initializeApp() {
                this.showLoading();

                // 認証状態の監視
                onAuthStateChanged(auth, (user) => {
                    this.handleAuthStateChange(user);
                });

                await this.yearManager.loadYears();
                this.renderYearOptions();

                await this.toolManager.loadTools();
                this.renderTools();
                this.hideLoading();
            }

            renderYearOptions() {
                const years = this.yearManager.years;
                
                // filterYear
                this.filterYear.innerHTML = '<option value="all">すべての年度</option>';
                years.forEach(y => {
                    const opt = document.createElement('option');
                    opt.value = y; opt.textContent = y;
                    this.filterYear.appendChild(opt);
                });
                
                // toolYear
                this.toolYearInput.innerHTML = '<option value="全年度">全年度</option>';
                years.forEach(y => {
                    const opt = document.createElement('option');
                    opt.value = y; opt.textContent = y;
                    this.toolYearInput.appendChild(opt);
                });
            }

            openYearModal() {
                this.renderYearList();
                this.yearModalOverlay.classList.add('active');
                this.newYearInput.focus();
            }

            closeYearModal() {
                this.yearModalOverlay.classList.remove('active');
                this.newYearInput.value = '';
            }

            renderYearList() {
                this.yearList.innerHTML = '';
                this.yearManager.years.forEach(y => {
                    const li = document.createElement('li');
                    li.style.display = 'flex';
                    li.style.justifyContent = 'space-between';
                    li.style.alignItems = 'center';
                    li.style.padding = '0.5rem';
                    li.style.borderBottom = '1px solid var(--border-color)';
                    
                    const text = document.createElement('span');
                    text.textContent = y;
                    text.style.fontWeight = 'bold';
                    
                    const delBtn = document.createElement('button');
                    delBtn.textContent = '削除';
                    delBtn.style.background = '#fee2e2';
                    delBtn.style.color = '#dc2626';
                    delBtn.style.border = 'none';
                    delBtn.style.padding = '0.3rem 0.6rem';
                    delBtn.style.borderRadius = '4px';
                    delBtn.style.cursor = 'pointer';
                    delBtn.onclick = async () => {
                        if (confirm(`${y} を削除しますか？`)) {
                            this.showLoading();
                            await this.yearManager.deleteYear(y);
                            this.renderYearOptions();
                            this.renderYearList();
                            // 削除して表示中の年が変わった場合は全てに戻す
                            if (this.currentYear === y) {
                                this.currentYear = 'all';
                                this.filterYear.value = 'all';
                            }
                            this.renderTools();
                            this.hideLoading();
                        }
                    };
                    
                    li.appendChild(text);
                    li.appendChild(delBtn);
                    this.yearList.appendChild(li);
                });
            }

            async handleAddYear() {
                const newYear = this.newYearInput.value.trim();
                if (!newYear) return;
                
                this.showLoading();
                await this.yearManager.addYear(newYear);
                this.newYearInput.value = '';
                this.renderYearOptions();
                this.renderYearList();
                this.hideLoading();
            }

            async handleLogin() {
                try {
                    await signInWithPopup(auth, provider);
                } catch (error) {
                    console.error("Login failed:", error);
                    alert("ログインに失敗しました。");
                }
            }

            async handleLogout() {
                try {
                    await signOut(auth);
                } catch (error) {
                    console.error("Logout failed:", error);
                }
            }

            handleAuthStateChange(user) {
                if (user) {
                    this.isAdmin = (user.email === ADMIN_EMAIL);
                    this.userInfo.textContent = user.email;
                    this.userInfo.style.display = 'block';
                    this.loginBtn.style.display = 'none';
                    this.logoutBtn.style.display = 'block';

                    if (this.isAdmin) {
                        this.openModalBtn.style.display = 'flex';
                        this.manageYearsBtn.style.display = 'flex';
                    } else {
                        this.openModalBtn.style.display = 'none';
                        this.manageYearsBtn.style.display = 'none';
                    }
                } else {
                    this.isAdmin = false;
                    this.userInfo.style.display = 'none';
                    this.loginBtn.style.display = 'block';
                    this.logoutBtn.style.display = 'none';
                    this.openModalBtn.style.display = 'none';
                    this.manageYearsBtn.style.display = 'none';
                }
                this.renderTools();
            }

            openModal(tool = null) {
                this.editingId = tool ? tool.id : null;
                this.modalTitle.textContent = tool ? 'ツールを編集' : 'ツールを追加';
                this.submitBtn.textContent = tool ? '更新する' : '追加する';

                if (tool) {
                    this.toolIdInput.value = tool.id;
                    this.toolNameInput.value = tool.name;
                    this.toolUrlInput.value = tool.url;
                    this.toolSubjectInput.value = tool.subject;
                    this.toolYearInput.value = tool.year || '全年度';
                    this.toolGradeInput.value = tool.grade || '全学年';
                } else {
                    this.toolForm.reset();
                    this.toolIdInput.value = '';
                    this.toolYearInput.value = '全年度';
                    this.toolGradeInput.value = '全学年';
                }

                this.modalOverlay.classList.add('active');
                this.toolNameInput.focus();
            }

            closeModal() {
                this.modalOverlay.classList.remove('active');
                this.editingId = null;
                this.toolForm.reset();
            }

            async handleSubmit(e) {
                e.preventDefault();
                this.showLoading();

                const toolData = {
                    name: this.toolNameInput.value.trim(),
                    url: this.toolUrlInput.value.trim(),
                    subject: this.toolSubjectInput.value,
                    year: this.toolYearInput.value,
                    grade: this.toolGradeInput.value
                };

                try {
                    if (this.editingId) {
                        await this.toolManager.updateTool(this.editingId, toolData);
                    } else {
                        await this.toolManager.addTool(toolData);
                    }

                    await this.toolManager.loadTools(); // データを再読み込み
                    this.closeModal();
                    this.renderTools();
                } catch (error) {
                    console.error("Error submitting tool:", error);
                    alert("保存に失敗しました。");
                } finally {
                    this.hideLoading();
                }
            }

            selectSubject(subject) {
                this.currentSubject = subject;

                // タブのアクティブ状態を更新
                document.querySelectorAll('.tab-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.subject === subject);
                });

                this.renderTools();
            }

            renderTools() {
                const tools = this.toolManager.getTools(this.currentSubject, this.currentYear, this.currentGrade);

                if (tools.length === 0) {
                    this.toolsGrid.innerHTML = '';
                    this.emptyState.style.display = 'block';
                    return;
                }

                this.emptyState.style.display = 'none';
                this.toolsGrid.innerHTML = tools.map(tool => this.createToolCard(tool)).join('');

                // イベントリスナーを追加
                this.toolsGrid.querySelectorAll('.open-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        window.open(btn.dataset.url, '_blank');
                    });
                });

                this.toolsGrid.querySelectorAll('.edit-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const tool = this.toolManager.getToolById(btn.dataset.id);
                        if (tool) this.openModal(tool);
                    });
                });

                this.toolsGrid.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const tool = this.toolManager.getToolById(btn.dataset.id);
                        if (tool) this.openDeleteModal(tool);
                    });
                });
            }

            createToolCard(tool) {
                return `
                    <div class="tool-card">
                        <div class="card-header ${tool.subject}"></div>
                        <div class="card-content">
                            <div class="tool-meta">
                                <span class="meta-badge">${tool.year || '全年度'}</span>
                                <span class="meta-badge">${tool.grade || '全学年'}</span>
                            </div>
                            <span class="card-subject ${tool.subject}">${tool.subject}</span>
                            <h3 class="card-title">${this.escapeHtml(tool.name)}</h3>
                            <p class="card-url">${this.escapeHtml(tool.url)}</p>
                            <div class="card-actions">
                                <button class="card-btn open-btn" data-url="${this.escapeHtml(tool.url)}">開く</button>
                                ${this.isAdmin ? `
                                <button class="card-btn edit-btn" data-id="${tool.id}">編集</button>
                                <button class="card-btn delete-btn" data-id="${tool.id}">🗑</button>
                                ` : ''}
                            </div>
                        </div>
                    </div>
                `;
            }

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            openDeleteModal(tool) {
                this.pendingDeleteId = tool.id;
                this.deleteToolName.textContent = tool.name;
                this.deleteModalOverlay.classList.add('active');
            }

            closeDeleteModal() {
                this.deleteModalOverlay.classList.remove('active');
                this.pendingDeleteId = null;
            }

            async executeDelete() {
                if (!this.pendingDeleteId) return;

                this.showLoading();
                try {
                    await this.toolManager.deleteTool(this.pendingDeleteId);
                    await this.toolManager.loadTools();
                    this.renderTools();
                    this.closeDeleteModal();
                } catch (error) {
                    console.error("Error deleting tool:", error);
                    alert("削除に失敗しました。");
                } finally {
                    this.hideLoading();
                }
            }
        }

        // アプリケーション初期化
        const toolManager = new ToolManager();
        const uiController = new UIController(toolManager);
    </script>
</body>

</html>
